---

- name: "Check if site directory exists"
  ansible.builtin.stat:
    path: "{{ container_base }}/{{site.id}}"
  register: site_dir

- name: "Needs a backup?"
  ansible.builtin.set_fact:
    need_backup: site.backup is defined and site.backup.perform_backup and (site_dir.stat.exists or site.root defined)

- ansible.builtin.debug:
    msg: "need_backup={{need_backup}}"

- name: "Backup Sites"
  ansible.builtin.include_tasks:
    file: restic_perform_backup.yml
  when: need_backup
