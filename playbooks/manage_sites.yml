---

- hosts: 
    - website_hosts
  become: true
  become_method: sudo
  gather_facts: true
  
  roles:
    - role: dockerhost
      vars:
        docker_users:
          - "{{ ansible_user }}"
      when: (skip_docker_host_role is undefined) or (skip_docker_host_role==False)
  
  tasks:
    
    - name: Distribution
      debug: msg="{{ ansible_facts['distribution'] }}"
    - name: Distribution version
      debug: msg="{{ ansible_facts['distribution_version']}}"
    - name: Distribution major version
      debug: msg="{{ ansible_facts['distribution_major_version'] }}"
    
    - name: "Ensure group 'mysql' exists"
      ansible.builtin.group:
        name: mysql
        state: present
    
    - name: "Ensure we have mysql user"
      ansible.builtin.user:
        name: mysql
        group: mysql
        state: present
        system: true
        create_home: false
      register: mysql_user_info
    
    - name: "Ensure restic is installed and updated"
      ansible.builtin.include_tasks:
        file: restic_install_update.yml
    
    - name: "Check if we have an Omeka-S site on {{inventory_hostname}}"
      ansible.builtin.set_fact:
        has_om_site: "{{has_om_site|default(false) or site.om_settings is defined}}"
      loop: "{{ sites }}"
      loop_control:
        loop_var: site
        label: "{{site.id}}"
    
    - name: "Host has Omeka-S site?"
      ansible.builtin.debug:
        msg: "has_om_site={{ has_om_site }}"
    
    - name: "Check if we have a WordPress site on {{inventory_hostname}}"
      ansible.builtin.set_fact:
        has_wp_site: "{{has_wp_site|default(false) or site.wp_settings is defined}}"
      loop: "{{ sites }}"
      loop_control:
        loop_var: site
        label: "{{site.id}}"
      
    - name: "Host has WordPress site?"
      ansible.builtin.debug:
          msg: "has_wp_site={{ has_wp_site }}"
    
    #NOTE: Wordpress site specific setup
    #not needed if only hosting Omeka sites on host
    - name: "Copy WordPress supporting files"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ container_base }}/{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      loop:
        - docker-compose-wp.yml
      register: copy_wp_supporting_files
      when: has_wp_site
    
    #NOTE: Omeka-S site specific setup
    #not needed if only hosting WordPress sites on host
    - name: "Copy Omeka-S supporting files"
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ container_base }}/{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      loop:
        - docker-compose-om.yml
        - docker-entrypoint.sh
      register: copy_om_supporting_files
      when: has_om_site
      
    - name: "Create Omeka-S Dockerfile"
      ansible.builtin.template:
        src: Dockerfile_om.j2
        dest: "{{ container_base }}/Dockerfile_om"
        owner:  "{{ ansible_user }}"
        group:  "{{ ansible_user }}"
      register: create_om_dockerfile
      when: has_om_site
      
    - name: "Create Omeka-S CLI Dockerfile"
      ansible.builtin.template:
        src: Dockerfile_om_cli.j2
        dest: "{{ container_base }}/Dockerfile_om_cli"
        owner:  "{{ ansible_user }}"
        group:  "{{ ansible_user }}"
      register: create_om_cli_dockerfile
      when: has_om_site
      
    - name: "Check if Omeka-S CLI docker image present"
      ansible.builtin.include_tasks:
        file: check_for_docker_image.yml
      vars:
        docker_image_name: "{{om_defaults.cli_image.split(':')[0]}}"
        docker_image_tag: "{{om_defaults.cli_image.split(':')[1]}}"
    
    - name: "Ensure Omeka-S CLI docker image built"
      ansible.builtin.include_tasks:
        file: om_build_cli_image.yml
      when: has_om_site and (create_om_cli_dockerfile.changed or not image_present)
    
    - name: "Manage WordPress sites"
      ansible.builtin.include_tasks:
        file: wp_manage_site.yml
      when: site.wp_settings is defined
      loop: "{{ sites }}"
      loop_control:
        label: "{{ item.id }}"
      vars:
        site: "{{ item }}"
    
    - name: "Manage Omeka sites"
      ansible.builtin.include_tasks:
        file: om_manage_site.yml
      when: site.om_settings is defined
      loop: "{{ sites }}"
      loop_control:
        label: "{{ item.id }}"
      vars:
        site: "{{ item }}"
    
    - name: "Remove dangling docker images"
      ansible.builtin.command: docker image prune -f
    
    - ansible.builtin.debug:
        msg:
        - '===================================================='
        - '======= The following themes are unspecified ======='
        - '===================================================='
        - "= To keep them, add them to the site's themes list ="
        - '= To remove them, set remove_unspecified_themes to ='
        - '= true.                                            ='
        - '===================================================='
      run_once: true
    
    - name: "List unspecified themes"
      ansible.builtin.set_fact:
        dummy: "{{ dummy|default([])+[item]}}"
      loop: "{{unspecified_themes}}"
      when: unspecified_themes is defined and unspecified_themes|length>0

    - ansible.builtin.debug:
        msg:
        - '===================================================='
        - '== The following plugins/modules are unspecified ==='
        - '===================================================='
        - "= To keep them, add them to the site's             ="
        - "= plugin/module list                               ="
        - '= To remove them, set remove_unspecified_modules/  ='
        - '= remove_unspecified_plugins true.                 ='
        - '===================================================='
      run_once: true
    
    - name: "List unspecified modules/plugins"
      ansible.builtin.set_fact:
        dummy: "{{ dummy|default([])+[item]}}"
      loop: "{{unspecified_plugins}}"
      when: unspecified_plugins is defined and unspecified_plugins|length>0
      
