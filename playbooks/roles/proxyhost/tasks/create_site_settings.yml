---

- name: "Set basic '/' location"
  ansible.builtin.set_fact:
    locations: "{{ {'slash': 'try_files $uri $uri/ =404;'} }}"

- name: "Add to nginx_vhosts for site {{site.id}}"
  ansible.builtin.set_fact:
    nginx_vhosts: "{{nginx_vhosts|default([]) + [{
      'listen': '443 ssl',
      'server_name': domain,
      'state':'present','template':'proxy_vhost.j2',
      'filename': domain,
      'root': site.root,
      'locations': locations},
      {'listen': '80',
      'server_name': domain,
      'filename': domain+'.80',
      'state': 'present',
      'template': 'proxy_vhost_redirect.j2'
      }]}}"
  loop: "{{ site.domains }}"
  loop_control:
    loop_var: domain
    label: "{{domain}}"

- name: "Set no default domain"
  ansible.builtin.set_fact:
    default_domain: []

- name: "Add to site_domains list for site {{site.id}}"
  ansible.builtin.set_fact:
    site_domains: "{{site_domains|default(default_domain) + [domain]}}"
  loop: "{{ site.domains }}"
  loop_control:
    loop_var: domain
    label: "{{domain}}"
