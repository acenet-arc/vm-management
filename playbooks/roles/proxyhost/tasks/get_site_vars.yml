---

- name: "Set host address"
  ansible.builtin.set_fact:
    host_address: >-
      {{ hostvars[host]['ansible_host'] if inventory_hostname!=host else 'localhost' }}

- name: "Site {{site.id}} is Omeka-S site?"
  ansible.builtin.set_fact:
    site_is_om: "{{site.om_settings is defined |default(false)}}"
  
- name: "Site {{site.id}} is WordPress site?"
  ansible.builtin.set_fact:
    site_is_wp: "{{site.wp_settings is defined |default(false)}}"
    
- name: "Site {{site.id}} login has IP restrictions?"
  ansible.builtin.set_fact:
    has_ip_restrictions: "{{site.login_ips is defined and site.login_ips|length|int>0}}"

- ansible.builtin.debug:
    msg: "has_ip_restrictions={{has_ip_restrictions}}"
    
- name: "Initialize ip_restrictions to empty string"
  ansible.builtin.set_fact:
    ip_restrictions: ""

- name: "Set ip_restrictions to deny all"
  ansible.builtin.set_fact:
    ip_restrictions: "\ndeny all;"
  when: has_ip_restrictions
  
- name: "Add allowed login IPs for site {{site.id}}"
  ansible.builtin.set_fact:
    ip_restrictions: "\nallow {{ip}};{{ip_restrictions}}"
  loop: "{{site.login_ips}}"
  loop_control:
    loop_var: ip
    label: "{{ip}}"
  when: has_ip_restrictions

- name: "Set login page location for Wordpress site"
  ansible.builtin.set_fact:
    login_location: "wp-admin"
  when: site_is_wp and login_location is not defined
  
- name: "Set login page location for Omeka-S site"
  ansible.builtin.set_fact:
    login_location: "login"
  when: site_is_om and login_location is not defined
  
- name: "Set login_location to 'login' since not defined yet"
  ansible.builtin.set_fact:
    login_location: "login"
  when: login_location is not defined
  
- name: "Set login_location to explicitly set login_location for site"
  ansible.builtin.set_fact:
    login_location: "{{site.login_location}}"
  when: site.login_location is defined
  
- name: "Set http_proto to default 'https'"
  ansible.builtin.set_fact:
    http_proto: "https"
  
- name: "Set http_proto to default site.http_container_proto"
  ansible.builtin.set_fact:
    http_proto: "{{site.http_container_proto}}"
  when: site.http_container_proto is defined
  
- name: "Set locations when login separate from slash"
  ansible.builtin.set_fact:
    locations: "{{ {
        'slash':'proxy_pass '+http_proto+'://'+host_address+':'+site.port|string+';',
        login_location:'proxy_pass '+http_proto+'://'+host_address+':'+site.port|string+'/'+login_location+';'+ip_restrictions
      } }}"
  when: login_location != "/" and login_location != "slash"
  
- name: "Set locations when login not separate from slash"
  ansible.builtin.set_fact:
    locations: "{{ {
        'slash':'proxy_pass '+http_proto+'://'+host_address+':'+site.port|string+';'+ip_restrictions
      } }}"
  when: login_location == "/" or login_location == "slash"
  
- name: "Add to nginx_vhosts for site {{site.id}}"
  ansible.builtin.set_fact:
    nginx_vhosts: "{{nginx_vhosts|default([]) + [{
      'listen': '443 ssl',
      'server_name': domain,
      'state':'present','template':'proxy_vhost.j2',
      'filename': domain,
      'locations': locations},
      {'listen': '80',
      'server_name': domain,
      'filename': domain+'.80',
      'state': 'present',
      'template': 'proxy_vhost_redirect.j2'
      }]}}"
  loop: "{{ site.domains }}"
  loop_control:
    loop_var: domain
    label: "{{domain}}"

- name: "Set no default domain"
  ansible.builtin.set_fact:
    default_domain: []

- name: "Set default domain to IP.cloud.computecanada.ca"
  ansible.builtin.set_fact:
    default_domain: "{{[ansible_host|replace('.','-')+'.cloud.computecanada.ca']}}"
  when: include_cc_domain is not defined or include_cc_domain==true

- name: "Add to proxy_domains list for site {{site.id}}"
  ansible.builtin.set_fact:
    proxy_domains: "{{proxy_domains|default(default_domain) + [domain]}}"
  loop: "{{ site.domains }}"
  loop_control:
    loop_var: domain
    label: "{{domain}}"
